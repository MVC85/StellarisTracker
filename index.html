<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellaris — Galaxy Map</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #04040c;
    --surface: #0d0d1e;
    --border: rgba(110, 130, 255, 0.2);
    --accent: #4a6cf7;
    --accent2: #7c9dff;
    --text: #c8d0f0;
    --muted: #4a5280;
    --gold: #e8c97a;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Orbitron', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--display);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.28em;
    color: var(--accent2);
    text-transform: uppercase;
  }
  .logo span { color: var(--muted); font-weight: 400; }
  .sep { width: 1px; height: 16px; background: var(--border); }
  .tagline { font-size: 9px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }

  #map-container {
    position: relative;
    flex-shrink: 0;
  }

  #gc {
    display: block;
    cursor: crosshair;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }

  /* HUD bar below the map */
  #hud {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(3, 3, 12, 0.84);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 20px;
    pointer-events: none;
    white-space: nowrap;
    min-width: 280px;
    justify-content: center;
    margin-top: 10px;
    flex-shrink: 0;
  }

  .hud-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* Fixed-width monospaced coord — never changes size */
  #hud-coord {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.05em;
    width: 130px;
    text-align: center;
    flex-shrink: 0;
  }

  #hud-coord.empty {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
  }

  .hud-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

  #hud-dir {
    font-size: 11px;
    color: var(--accent2);
    width: 36px;
    text-align: center;
    flex-shrink: 0;
  }

  #toast {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--accent);
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 7px 20px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.22s, transform 0.22s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hint {
    margin-top: 10px;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .q-label {
    position: absolute;
    font-family: var(--display);
    font-size: 13px;
    font-weight: 600;
    color: rgba(160,185,255,0.6);
    letter-spacing: 0.15em;
    pointer-events: none;
    user-select: none;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>

<header>
  <div class="logo">Stellaris <span>/ Galaxy Map</span></div>
  <div class="sep"></div>
  <div class="tagline">Coordinate Tracker</div>
</header>

<div id="map-container">
  <canvas id="gc"></canvas>
  <canvas id="overlay"></canvas>
</div>

<div id="hud">
  <span class="hud-label">coord</span>
  <div class="hud-sep"></div>
  <span id="hud-coord" class="empty">— —</span>
  <div class="hud-sep"></div>
  <span id="hud-dir">—</span>
</div>

<div class="hint">hover → lê &nbsp;·&nbsp; clique → copia &nbsp;·&nbsp; duplo clique → pin (salvo na url)</div>
<div id="toast"></div>

<script>
(function () {

  /* ── Sizing: fill available viewport ── */
  const MARGIN = 160;
  const RAW = Math.min(window.innerWidth - 20, window.innerHeight - MARGIN, 860);
  const PAD = 28; // space outside the circle for N/L/S/O labels
  const SIZE = Math.floor(RAW / 2) * 2;
  const CX = SIZE / 2, CY = SIZE / 2, R = SIZE / 2 - PAD;

  const gc  = document.getElementById('gc');
  const ov  = document.getElementById('overlay');
  gc.width = ov.width = SIZE;
  gc.height = ov.height = SIZE;
  gc.style.width = ov.style.width = SIZE + 'px';
  gc.style.height = ov.style.height = SIZE + 'px';

  const gctx = gc.getContext('2d');
  const octx = ov.getContext('2d');

  /* ── Quadrant labels as HTML elements ── */
  const mapContainer = document.getElementById('map-container');
  const QDIST = R + PAD * 0.7; // distance from center to label
  [
    { label: 'N', angle: -Math.PI / 2 },
    { label: 'L', angle: 0 },
    { label: 'S', angle:  Math.PI / 2 },
    { label: 'O', angle:  Math.PI },
  ].forEach(({ label, angle }) => {
    const el = document.createElement('div');
    el.className = 'q-label';
    el.textContent = label;
    el.style.left = (CX + Math.cos(angle) * QDIST) + 'px';
    el.style.top  = (CY + Math.sin(angle) * QDIST) + 'px';
    mapContainer.appendChild(el);
  });

  /* ── Star field ── */
  const stars = [];
  const rnd = (a, b) => a + Math.random() * (b - a);
  const ARMS = 5;
  const armHues = [220, 240, 200, 230, 210];

  for (let arm = 0; arm < ARMS; arm++) {
    const base = (arm / ARMS) * Math.PI * 2;
    for (let i = 0; i < 500; i++) {
      const t = i / 500;
      const dist = t * R * 0.91;
      const spread = rnd(0, 0.22) * (1 + t * 0.6);
      const angle = base + t * Math.PI * 3.4 + (Math.random() - 0.5) * spread * 2;
      const x = CX + Math.cos(angle) * dist;
      const y = CY + Math.sin(angle) * dist;
      if (Math.hypot(x - CX, y - CY) > R - 4) continue;
      stars.push({ x, y, r: Math.random() < 0.04 ? rnd(1.2, 2.2) : rnd(0.3, 1.0), a: rnd(0.35, 0.95), h: armHues[arm] });
    }
  }
  for (let i = 0; i < 1000; i++) {
    const ang = Math.random() * Math.PI * 2;
    const d = Math.random() * R * 0.97;
    stars.push({ x: CX + Math.cos(ang)*d, y: CY + Math.sin(ang)*d, r: rnd(0.15, 0.5), a: rnd(0.08, 0.28), h: 220 });
  }

  /* ── Draw static galaxy ── */
  function drawGalaxy() {
    gctx.clearRect(0, 0, SIZE, SIZE);
    gctx.save();
    gctx.beginPath();
    gctx.arc(CX, CY, R, 0, Math.PI * 2);
    gctx.clip();

    gctx.fillStyle = '#03030b';
    gctx.fillRect(0, 0, SIZE, SIZE);

    const cg = gctx.createRadialGradient(CX, CY, 0, CX, CY, R * 0.18);
    cg.addColorStop(0, 'rgba(255,248,215,0.65)');
    cg.addColorStop(0.3, 'rgba(180,160,255,0.18)');
    cg.addColorStop(1, 'rgba(0,0,0,0)');
    gctx.beginPath(); gctx.arc(CX, CY, R * 0.18, 0, Math.PI * 2);
    gctx.fillStyle = cg; gctx.fill();

    for (let arm = 0; arm < ARMS; arm++) {
      const base = (arm / ARMS) * Math.PI * 2;
      for (let i = 0; i < 10; i++) {
        const t = i / 10;
        const d = t * R * 0.86;
        const angle = base + t * Math.PI * 3.4;
        const gx = CX + Math.cos(angle) * d;
        const gy = CY + Math.sin(angle) * d;
        const gr = gctx.createRadialGradient(gx, gy, 0, gx, gy, d * 0.2 + 14);
        gr.addColorStop(0, `hsla(${armHues[arm]},80%,75%,0.055)`);
        gr.addColorStop(1, 'rgba(0,0,0,0)');
        gctx.beginPath(); gctx.arc(gx, gy, d * 0.2 + 14, 0, Math.PI * 2);
        gctx.fillStyle = gr; gctx.fill();
      }
    }

    for (const s of stars) {
      gctx.beginPath();
      gctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      gctx.fillStyle = `hsla(${s.h},70%,85%,${s.a})`;
      gctx.fill();
    }

    gctx.restore();

    // distance rings (dashed)
    gctx.save();
    gctx.setLineDash([2, 7]);
    gctx.strokeStyle = 'rgba(100,120,220,0.11)';
    gctx.lineWidth = 0.6;
    for (let i = 2; i <= 10; i += 2) {
      gctx.beginPath();
      gctx.arc(CX, CY, R * i / 10, 0, Math.PI * 2);
      gctx.stroke();
    }
    gctx.restore();

    // clock spokes (dashed)
    gctx.save();
    gctx.setLineDash([1, 9]);
    gctx.strokeStyle = 'rgba(100,120,220,0.11)';
    gctx.lineWidth = 0.6;
    for (let h = 0; h < 12; h++) {
      const a = (h / 12) * Math.PI * 2 - Math.PI / 2;
      gctx.beginPath();
      gctx.moveTo(CX, CY);
      gctx.lineTo(CX + Math.cos(a) * R, CY + Math.sin(a) * R);
      gctx.stroke();
    }
    gctx.restore();

    // hour labels near the rim, inside the galaxy
    const fontSize = Math.max(9, Math.round(SIZE * 0.018));
    gctx.save();
    gctx.font = `${fontSize}px "Share Tech Mono", monospace`;
    gctx.textAlign = 'center';
    gctx.textBaseline = 'middle';
    gctx.fillStyle = 'rgba(140,160,230,0.5)';
    for (let h = 1; h <= 12; h++) {
      const a = (h / 12) * Math.PI * 2 - Math.PI / 2;
      const lr = R - fontSize * 1.5;
      gctx.fillText(h + 'h', CX + Math.cos(a) * lr, CY + Math.sin(a) * lr);
    }
    gctx.restore();

    // outer ring
    gctx.save();
    gctx.beginPath();
    gctx.arc(CX, CY, R, 0, Math.PI * 2);
    gctx.strokeStyle = 'rgba(120,140,255,0.22)';
    gctx.lineWidth = 1;
    gctx.setLineDash([]);
    gctx.stroke();
    gctx.restore();



    // center
    gctx.beginPath();
    gctx.arc(CX, CY, 3, 0, Math.PI * 2);
    gctx.fillStyle = 'rgba(255,248,200,0.9)';
    gctx.fill();
  }

  drawGalaxy();

  /* ── Overlay clock position ── */
  // Clock is drawn in the upper-right area of the galaxy
  const CLOCK_R = SIZE * 0.12;
  const CLOCK_X = CX + R * 0.60;
  const CLOCK_Y = CY - R * 0.60;

  function drawOverlay(angleDeg, distPct, mx, my, coordText, dirText) {
    octx.clearRect(0, 0, SIZE, SIZE);

    // ── Sector highlight (fatia de pizza entre as duas horas mais proximas) ──
    const hourAngle = (angleDeg / 360) * 12;
    const h0 = Math.floor(hourAngle);
    const h1 = h0 + 1;
    const a0 = (h0 / 12) * Math.PI * 2 - Math.PI / 2;
    const a1 = (h1 / 12) * Math.PI * 2 - Math.PI / 2;
    octx.save();
    octx.beginPath();
    octx.moveTo(CX, CY);
    octx.arc(CX, CY, R, a0, a1);
    octx.closePath();
    var sectorGrad = octx.createRadialGradient(CX, CY, 0, CX, CY, R);
    sectorGrad.addColorStop(0,   'rgba(74,108,247,0)');
    sectorGrad.addColorStop(0.3, 'rgba(74,108,247,0.07)');
    sectorGrad.addColorStop(1,   'rgba(100,140,255,0.13)');
    octx.fillStyle = sectorGrad;
    octx.fill();
    octx.strokeStyle = 'rgba(110,140,255,0.25)';
    octx.lineWidth = 1;
    octx.setLineDash([3, 6]);
    octx.beginPath(); octx.moveTo(CX, CY); octx.lineTo(CX + Math.cos(a0) * R, CY + Math.sin(a0) * R); octx.stroke();
    octx.beginPath(); octx.moveTo(CX, CY); octx.lineTo(CX + Math.cos(a1) * R, CY + Math.sin(a1) * R); octx.stroke();
    octx.restore();

    // ── Anel de distancia ativo ──
    var distFrac = distPct / 100;
    var nearestRing = Math.round(distFrac / 0.2) * 0.2;
    if (nearestRing > 0 && nearestRing <= 1) {
      octx.save();
      octx.beginPath();
      octx.arc(CX, CY, R * nearestRing, 0, Math.PI * 2);
      octx.strokeStyle = 'rgba(232,201,122,0.45)';
      octx.lineWidth = 1.2;
      octx.setLineDash([4, 6]);
      octx.stroke();
      var ringLabel = Math.round(nearestRing * 100) + '%';
      var rfs = Math.max(8, Math.round(SIZE * 0.014));
      octx.font = rfs + 'px "Share Tech Mono", monospace';
      octx.fillStyle = 'rgba(232,201,122,0.6)';
      octx.textAlign = 'left';
      octx.textBaseline = 'middle';
      octx.fillText(ringLabel, CX + R * nearestRing + 4, CY - 4);
      octx.restore();
    }

    // ── Crosshair at cursor ──
    const len = 10, gap = 5;
    octx.save();
    octx.strokeStyle = 'rgba(74,108,247,0.75)';
    octx.lineWidth = 1;
    octx.setLineDash([]);
    octx.beginPath();
    octx.moveTo(mx - len - gap, my); octx.lineTo(mx - gap, my);
    octx.moveTo(mx + gap, my);       octx.lineTo(mx + len + gap, my);
    octx.moveTo(mx, my - len - gap); octx.lineTo(mx, my - gap);
    octx.moveTo(mx, my + gap);       octx.lineTo(mx, my + len + gap);
    octx.stroke();
    octx.beginPath();
    octx.arc(mx, my, gap, 0, Math.PI * 2);
    octx.strokeStyle = 'rgba(232,201,122,0.75)';
    octx.stroke();
    octx.restore();

    // ── Floating coord label ──
    const label = coordText + '  ' + dirText;
    const tfs = Math.max(10, Math.round(SIZE * 0.019));
    octx.save();
    octx.font = `600 ${tfs}px "Orbitron", monospace`;
    const tw = octx.measureText(label).width;
    const th = tfs + 4;
    const pad = 7;
    const offX = 18, offY = -14;
    // flip to left if too close to right edge
    let tx = mx + offX;
    if (tx + tw + pad * 2 > SIZE) tx = mx - offX - tw - pad * 2;
    const ty = my + offY - th / 2;
    // background pill
    octx.beginPath();
    const bx = tx - pad, by = ty - pad, bw = tw + pad * 2, bh = th + pad * 2;
    const br = 4;
    octx.moveTo(bx + br, by);
    octx.lineTo(bx + bw - br, by); octx.arcTo(bx + bw, by, bx + bw, by + br, br);
    octx.lineTo(bx + bw, by + bh - br); octx.arcTo(bx + bw, by + bh, bx + bw - br, by + bh, br);
    octx.lineTo(bx + br, by + bh); octx.arcTo(bx, by + bh, bx, by + bh - br, br);
    octx.lineTo(bx, by + br); octx.arcTo(bx, by, bx + br, by, br);
    octx.closePath();
    octx.fillStyle = 'rgba(4,4,16,0.88)';
    octx.fill();
    octx.strokeStyle = 'rgba(110,130,255,0.35)';
    octx.lineWidth = 1;
    octx.stroke();
    // text
    octx.fillStyle = '#e8c97a';
    octx.textBaseline = 'middle';
    octx.fillText(label, tx, ty + th / 2 + 1);
    octx.restore();
  }

  /* ── Coordinate math ── */
  function getCoord(clientX, clientY) {
    const rect = gc.getBoundingClientRect();
    const px = (clientX - rect.left) * (SIZE / rect.width);
    const py = (clientY - rect.top) * (SIZE / rect.height);
    const dx = px - CX, dy = py - CY;
    const dist = Math.hypot(dx, dy);
    if (dist > R) return null;

    let angleDeg = Math.atan2(dy, dx) * 180 / Math.PI + 90;
    if (angleDeg < 0) angleDeg += 360;
    if (angleDeg >= 360) angleDeg -= 360;

    const totalMinutes = (angleDeg / 360) * 720;
    const hour   = Math.floor(totalMinutes / 60) % 12 || 12;
    const minute = Math.floor(totalMinutes % 60);
    const distPct = Math.round((dist / R) * 100);

    return { hour, minute, distPct, angleDeg, px, py };
  }

  // Format sem colchetes — para exibição
  function formatCoord(c) {
    const h = String(c.hour).padStart(2, '0');
    const m = String(c.minute).padStart(2, '0');
    const d = String(c.distPct).padStart(2, '0');
    return `${h}.${m}-${d}`;
  }
  // Format com colchetes — para clipboard
  function formatCoordClip(c) {
    const h = String(c.hour).padStart(2, '0');
    const m = String(c.minute).padStart(2, '0');
    const d = String(c.distPct).padStart(2, '0');
    return `[${h}\uD83C\uDDED${m}\uD83C\uDDF2${d}\uD83C\uDDE9] `;
  }

  const COMPASS = ['N','NNE','NE','ENE','L','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
  const compassDir = a => COMPASS[Math.round(a / 22.5) % 16];

  /* ── HUD ── */
  const hudCoord = document.getElementById('hud-coord');
  const hudDir   = document.getElementById('hud-dir');
  const toast    = document.getElementById('toast');

  gc.addEventListener('mousemove', function (e) {
    const c = getCoord(e.clientX, e.clientY);
    if (!c) {
      octx.clearRect(0, 0, SIZE, SIZE);
      hudCoord.textContent = '— —';
      hudCoord.className = 'empty';
      hudDir.textContent = '—';
      return;
    }
    hudCoord.textContent = formatCoord(c);
    hudCoord.className = '';
    hudDir.textContent = compassDir(c.angleDeg);
    drawOverlay(c.angleDeg, c.distPct, c.px, c.py, formatCoord(c), compassDir(c.angleDeg));
  });

  gc.addEventListener('mouseleave', function () {
    octx.clearRect(0, 0, SIZE, SIZE);
    hudCoord.textContent = '— —';
    hudCoord.className = 'empty';
    hudDir.textContent = '—';
  });

  /* ── Pin system ── */
  var pins = [];
  var pinCounter = 0;
  var selectedPin = -1; // índice do pin selecionado (exibe lixeira)

  function savePinsToURL() {
    if (pins.length === 0) {
      history.replaceState(null, '', window.location.pathname + window.location.search);
      return;
    }
    var encoded = pins.map(function(p) {
      return p.id + ':' + p.hour + '.' + p.minute + '-' + p.distPct + ':' + Math.round(p.angleDeg * 100) + ':' + Math.round(p.px) + ':' + Math.round(p.py);
    }).join(',');
    history.replaceState(null, '', '#pins=' + encoded);
  }

  function loadPinsFromURL() {
    var hash = window.location.hash;
    if (!hash || hash.indexOf('pins=') === -1) return;
    var raw = hash.replace('#pins=', '');
    raw.split(',').forEach(function(seg) {
      var parts = seg.split(':');
      if (parts.length < 5) return;
      var id     = parseInt(parts[0]);
      var coord  = parts[1];
      var angDeg = parseInt(parts[2]) / 100;
      var px     = parseInt(parts[3]);
      var py     = parseInt(parts[4]);
      var m1 = coord.match(/^(\d+)\.(\d+)-(\d+)$/);
      if (!m1) return;
      pins.push({ id: id, hour: parseInt(m1[1]), minute: parseInt(m1[2]), distPct: parseInt(m1[3]), angleDeg: angDeg, px: px, py: py });
      if (id >= pinCounter) pinCounter = id + 1;
    });
    drawPins();
  }

  function pinHitTest(px, py) {
    var HIT = 14;
    for (var i = pins.length - 1; i >= 0; i--) {
      var p = pins[i];
      // hit na bolinha do pin (que fica 18px acima do ponto)
      if (Math.hypot(px - p.px, py - (p.py - 18)) < HIT) return i;
    }
    return -1;
  }

  function trashHitTest(px, py) {
    if (selectedPin === -1) return false;
    var p = pins[selectedPin];
    // lixeira fica 20px à direita da bolinha
    var tx = p.px + 20, ty = p.py - 36;
    return Math.hypot(px - tx, py - ty) < 12;
  }

  function drawPin(ctx, p, selected) {
    ctx.save();
    // haste
    ctx.beginPath();
    ctx.moveTo(p.px, p.py);
    ctx.lineTo(p.px, p.py - 18);
    ctx.strokeStyle = selected ? 'rgba(255,100,100,0.9)' : 'rgba(232,201,122,0.9)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);
    ctx.stroke();
    // círculo
    ctx.beginPath();
    ctx.arc(p.px, p.py - 18, 10, 0, Math.PI * 2);
    ctx.fillStyle = selected ? 'rgba(40,10,10,0.92)' : 'rgba(10,10,30,0.88)';
    ctx.fill();
    ctx.strokeStyle = selected ? 'rgba(255,100,100,0.9)' : 'rgba(232,201,122,0.8)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    // número
    ctx.font = 'bold 10px "Share Tech Mono", monospace';
    ctx.fillStyle = selected ? 'rgba(255,150,150,1)' : 'rgba(232,201,122,1)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(p.id), p.px, p.py - 17);
    // lixeira (só se selecionado)
    if (selected) {
      var tx = p.px + 20, ty = p.py - 36;
      // fundo
      ctx.beginPath();
      ctx.arc(tx, ty, 11, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(180,40,40,0.92)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,120,120,0.8)';
      ctx.lineWidth = 1;
      ctx.stroke();
      // ícone lixeira (desenhado manualmente, simples)
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.2;
      ctx.setLineDash([]);
      var lx = tx, ly = ty;
      // corpo
      ctx.strokeRect(lx - 4, ly - 2, 8, 7);
      // tampa
      ctx.beginPath();
      ctx.moveTo(lx - 5, ly - 2); ctx.lineTo(lx + 5, ly - 2);
      ctx.stroke();
      // alça
      ctx.beginPath();
      ctx.moveTo(lx - 2, ly - 2); ctx.lineTo(lx - 2, ly - 4);
      ctx.lineTo(lx + 2, ly - 4); ctx.lineTo(lx + 2, ly - 2);
      ctx.stroke();
      // linhas internas
      ctx.beginPath();
      ctx.moveTo(lx, ly - 1); ctx.lineTo(lx, ly + 4);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawPins() {
    gctx.clearRect(0, 0, SIZE, SIZE);
    drawGalaxy();
    pins.forEach(function(p, i) {
      drawPin(gctx, p, i === selectedPin);
    });
  }

  // Clique simples
  gc.addEventListener('click', function (e) {
    var rect = gc.getBoundingClientRect();
    var px = (e.clientX - rect.left) * (SIZE / rect.width);
    var py = (e.clientY - rect.top)  * (SIZE / rect.height);

    // clique na lixeira?
    if (selectedPin !== -1 && trashHitTest(px, py)) {
      pins.splice(selectedPin, 1);
      selectedPin = -1;
      drawPins();
      savePinsToURL();
      showToast('pin removido');
      return;
    }

    // clique num pin?
    var hit = pinHitTest(px, py);
    if (hit !== -1) {
      if (selectedPin === hit) {
        // segundo clique no mesmo: deseleciona e copia
        var p = pins[hit];
        selectedPin = -1;
        drawPins();
        copyText(formatCoordClip(p));
      } else {
        // seleciona e exibe lixeira
        selectedPin = hit;
        drawPins();
      }
      return;
    }

    // clique fora: deseleciona
    if (selectedPin !== -1) {
      selectedPin = -1;
      drawPins();
      return;
    }

    // clique normal: copia coord
    var c = getCoord(e.clientX, e.clientY);
    if (!c) return;
    copyText(formatCoordClip(c));
  });

  // Duplo clique: adiciona pin
  gc.addEventListener('dblclick', function (e) {
    var rect = gc.getBoundingClientRect();
    var px = (e.clientX - rect.left) * (SIZE / rect.width);
    var py = (e.clientY - rect.top)  * (SIZE / rect.height);

    // não adiciona se clicou em cima de um pin
    if (pinHitTest(px, py) !== -1) return;

    var c = getCoord(e.clientX, e.clientY);
    if (!c) return;
    selectedPin = -1;
    pinCounter++;
    pins.push({ id: pinCounter, hour: c.hour, minute: c.minute, distPct: c.distPct, angleDeg: c.angleDeg, px: Math.round(c.px), py: Math.round(c.py) });
    drawPins();
    savePinsToURL();
    showToast('pin #' + pinCounter + '  ' + formatCoord(c));
  });

  // Carrega pins salvos na URL ao iniciar
  loadPinsFromURL();

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function() { toast.classList.remove('show'); }, 2400);
  }

  function copyText(text) {
    var ok = function() { showToast('copiado  ' + text); };
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(ok).catch(function() { fallback(text, ok); });
    } else {
      fallback(text, ok);
    }
  }

  function fallback(text, cb) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    cb();
  }

})();
</script>
</body>
</html>
